---
# toolbox-dev configuration
# Copy to ~/.config/toolbox-dev/config.yml and enable desired roles.

languages:
  python_development: true
  nodejs_development: true
  go_development: true
  rust_development: true
  cpp_development: true
  ruby_development: true
  dotnet_development: true
  zig_development: true

environments:
  fedora_packaging: true
  game_developemnt: true
  agent: true

# Custom playbooks to include (list of paths to task files)
# Example:
#   custom_playbooks:
#     - ~/.config/toolbox-dev/playbooks/my-setup.yml
custom_playbooks: []
