---
- name: Install .NET SDK and runtime
  ansible.builtin.dnf:
    name:
      - dotnet-sdk-10.0
      - dotnet-runtime-10.0
      - libicu
    state: present
  when: languages.dotnet_development | default(false) | bool

- name: Create wrapper scripts
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/bin-wrapper.sh.j2"
    dest: "{{ tdx_user_bin }}/{{ item }}"
    owner: "{{ tdx_user }}"
    mode: "0755"
  loop: "{{ dotnet_development_binaries }}"
  when: languages.dotnet_development | default(false) | bool

- name: Remove wrapper scripts
  ansible.builtin.file:
    path: "{{ tdx_user_bin }}/{{ item }}"
    state: absent
  loop: "{{ dotnet_development_binaries }}"
  when: not (languages.dotnet_development | default(false) | bool)
