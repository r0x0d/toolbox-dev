---
- name: Install C++ development packages
  ansible.builtin.dnf:
    name:
      - g++
      - gcc
      - gcc-c++
      - ctags
      - clangd
      - cmake
    state: present
  when: languages.cpp_development | default(false) | bool

- name: Create wrapper scripts
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/bin-wrapper.sh.j2"
    dest: "{{ tdx_user_bin }}/{{ item }}"
    owner: "{{ tdx_user }}"
    mode: "0755"
  loop: "{{ cpp_development_binaries }}"
  when: languages.cpp_development | default(false) | bool

- name: Remove wrapper scripts
  ansible.builtin.file:
    path: "{{ tdx_user_bin }}/{{ item }}"
    state: absent
  loop: "{{ cpp_development_binaries }}"
  when: not (languages.cpp_development | default(false) | bool)
